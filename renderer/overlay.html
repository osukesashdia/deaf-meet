<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Caption Overlay</title>
    <style>
      :root {
        color-scheme: light;
        font-family: "Avenir Next", "Segoe UI", sans-serif;
      }

      html,
      body {
        width: 100%;
        height: 100%;
        margin: 0;
        background: transparent !important;
        overflow: hidden;
      }

      body {
        display: flex;
      }

      #stage {
        width: 100%;
        height: 100%;
        padding: 14px 28px;
        display: flex;
        align-items: flex-end;
        justify-content: center;
        box-sizing: border-box;
      }

      #stage.position-top {
        align-items: flex-start;
      }

      #stage.position-middle {
        align-items: center;
      }

      .conversation-panel {
        width: min(100%, 1120px);
        max-height: 100%;
        border-radius: 28px;
        padding: 14px;
        overflow: hidden;
        position: relative;
        transform: translate(0, 0);
        display: grid;
        gap: 12px;
      }

      .conversation-panel.editable {
        outline: 2px dashed rgba(255, 255, 255, 0.5);
      }

      .edit-toolbar {
        display: none;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        padding: 8px 12px 12px;
        color: #ffffff;
        font-size: 12px;
        letter-spacing: 0.03em;
        text-transform: uppercase;
      }

      .conversation-panel.editable .edit-toolbar {
        display: flex;
      }

      .edit-label {
        opacity: 0.92;
      }

      .resize-handle {
        position: absolute;
        right: 10px;
        bottom: 10px;
        width: 18px;
        height: 18px;
        border-right: 3px solid rgba(255, 255, 255, 0.75);
        border-bottom: 3px solid rgba(255, 255, 255, 0.75);
        cursor: nwse-resize;
        display: none;
      }

      .conversation-panel.editable .resize-handle {
        display: block;
      }

      .theme-dark .conversation-panel {
        background: rgba(10, 10, 10, 0.3);
        backdrop-filter: blur(10px);
      }

      .theme-light .conversation-panel {
        background: rgba(255, 255, 255, 0.28);
        backdrop-filter: blur(10px);
      }

      .theme-yellow .conversation-panel {
        background: rgba(255, 220, 0, 0.16);
      }

      .theme-blue .conversation-panel {
        background: rgba(14, 90, 210, 0.2);
        backdrop-filter: blur(8px);
      }

      .theme-outline .conversation-panel {
        background: rgba(0, 0, 0, 0.18);
      }

      #caption-stack {
        display: flex;
        flex-direction: column;
        gap: 12px;
        align-items: stretch;
        width: 100%;
        min-height: 0;
        overflow-y: auto;
        overflow-x: hidden;
        padding-right: 6px;
      }

      #caption-stack::-webkit-scrollbar {
        width: 8px;
      }

      #caption-stack::-webkit-scrollbar-thumb {
        background: rgba(255, 255, 255, 0.22);
        border-radius: 999px;
      }

      .caption-pill {
        display: grid;
        grid-template-columns: minmax(0, 1fr) auto;
        gap: 14px;
        max-width: 100%;
        padding: 14px 22px;
        border-radius: 26px;
        text-align: left;
        line-height: 1.35;
        letter-spacing: 0.01em;
        animation: slideIn 220ms cubic-bezier(0.34, 1.56, 0.64, 1);
        word-break: break-word;
        border: 2px solid transparent;
      }

      .theme-dark .caption-pill {
        background: rgba(0, 0, 0, 0.82);
        color: #ffffff;
        backdrop-filter: blur(12px);
        box-shadow: 0 20px 40px rgba(0, 0, 0, 0.22);
      }

      .theme-light .caption-pill {
        background: rgba(255, 255, 255, 0.92);
        color: #111111;
        backdrop-filter: blur(12px);
        box-shadow: 0 18px 36px rgba(25, 20, 15, 0.14);
      }

      .theme-yellow .caption-pill {
        background: rgba(255, 220, 0, 0.95);
        color: #17120a;
        box-shadow: 0 18px 36px rgba(120, 88, 0, 0.2);
      }

      .theme-blue .caption-pill {
        background: rgba(14, 90, 210, 0.88);
        color: #ffffff;
        backdrop-filter: blur(10px);
        box-shadow: 0 20px 40px rgba(14, 90, 210, 0.24);
      }

      .theme-outline .caption-pill {
        background: transparent;
        color: #ffffff;
        text-shadow:
          0 1px 0 rgba(0, 0, 0, 0.95),
          1px 0 0 rgba(0, 0, 0, 0.95),
          0 -1px 0 rgba(0, 0, 0, 0.95),
          -1px 0 0 rgba(0, 0, 0, 0.95),
          1px 1px 0 rgba(0, 0, 0, 0.95),
          -1px 1px 0 rgba(0, 0, 0, 0.95),
          1px -1px 0 rgba(0, 0, 0, 0.95),
          -1px -1px 0 rgba(0, 0, 0, 0.95);
      }

      .caption-pill.emotion-happy {
        color: #1f7a31;
        border-color: rgba(84, 199, 111, 0.42);
      }

      .caption-pill.emotion-sad {
        color: #1f5fa8;
        border-color: rgba(72, 136, 231, 0.38);
      }

      .caption-pill.emotion-angry {
        color: #b42318;
        border-color: rgba(230, 77, 46, 0.42);
      }

      .caption-pill.emotion-calm {
        color: #347d7a;
        border-color: rgba(52, 125, 122, 0.3);
      }

      .caption-pill.emotion-excited {
        color: #8b3fd6;
        border-color: rgba(139, 63, 214, 0.36);
      }

      .caption-pill.emotion-neutral {
        color: #ffffff;
        border-color: rgba(255, 255, 255, 0.16);
      }

      .caption-text {
        min-width: 0;
      }

      .emotion-chip {
        flex-shrink: 0;
        padding: 6px 10px;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.14);
        font-size: 12px;
        font-weight: 600;
        letter-spacing: 0.03em;
        text-transform: uppercase;
        white-space: nowrap;
      }

      .live-rhythm {
        display: grid;
        gap: 8px;
        padding: 10px 12px 12px;
        border-radius: 22px;
        background: rgba(255, 255, 255, 0.06);
        border: 1px solid rgba(255, 255, 255, 0.08);
      }

      .theme-light .live-rhythm,
      .theme-yellow .live-rhythm {
        background: rgba(0, 0, 0, 0.05);
        border-color: rgba(0, 0, 0, 0.08);
      }

      .rhythm-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        font-size: 11px;
        font-weight: 700;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }

      .rhythm-title {
        opacity: 0.82;
      }

      .rhythm-chart {
        width: 100%;
        height: 46px;
        border-radius: 14px;
        background: rgba(255, 255, 255, 0.07);
        border: 1px solid rgba(255, 255, 255, 0.08);
        overflow: hidden;
      }

      .rhythm-chart svg {
        width: 100%;
        height: 100%;
        display: block;
      }

      .rhythm-line {
        fill: none;
        stroke: rgba(255, 255, 255, 0.88);
        stroke-width: 3;
        stroke-linecap: round;
        stroke-linejoin: round;
      }

      .rhythm-line.interruption {
        stroke: rgba(255, 180, 120, 0.9);
        stroke-width: 2;
        stroke-dasharray: 4 4;
      }

      .theme-light .rhythm-line,
      .theme-yellow .rhythm-line {
        stroke: rgba(23, 18, 10, 0.88);
      }

      .theme-light .rhythm-line.interruption,
      .theme-yellow .rhythm-line.interruption {
        stroke: rgba(184, 92, 56, 0.95);
      }

      .rhythm-pill {
        padding: 4px 8px;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.12);
        font-size: 10px;
        font-weight: 600;
        letter-spacing: 0.05em;
        text-transform: uppercase;
        color: inherit;
      }

      .theme-light .rhythm-pill,
      .theme-yellow .rhythm-pill {
        background: rgba(0, 0, 0, 0.08);
      }

      .theme-outline .caption-pill.emotion-happy {
        color: #98f5a9;
      }

      .theme-outline .caption-pill.emotion-sad {
        color: #8ec7ff;
      }

      .theme-outline .caption-pill.emotion-angry {
        color: #ff9b7d;
      }

      .theme-outline .caption-pill.emotion-calm {
        color: #93f2ef;
      }

      .theme-outline .caption-pill.emotion-excited {
        color: #d8b5ff;
      }

      .theme-outline .live-rhythm {
        background: rgba(0, 0, 0, 0.28);
      }

      @keyframes slideIn {
        from {
          opacity: 0;
          transform: translateY(12px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
    </style>
  </head>
  <body>
    <div id="stage" class="theme-dark position-bottom">
      <div class="conversation-panel">
        <div class="edit-toolbar">
          <div class="edit-label">Edit Mode: drag panel and use corner to resize</div>
        </div>
        <div class="live-rhythm">
          <div class="rhythm-header">
            <span class="rhythm-title">Live Sound Rhythm</span>
            <span id="rhythm-meta" class="rhythm-pill">Waiting</span>
          </div>
          <div class="rhythm-chart" aria-hidden="true">
            <svg viewBox="0 0 260 46" preserveAspectRatio="none">
              <polyline id="volume-line" class="rhythm-line" points="0,40 260,40"></polyline>
              <polyline id="interruption-line" class="rhythm-line interruption" points="0,40 260,40"></polyline>
            </svg>
          </div>
        </div>
        <div id="caption-stack"></div>
        <div class="resize-handle" aria-hidden="true"></div>
      </div>
    </div>
    <script>
      const DEMO_TIMEOUT = 3500;
      const stage = document.getElementById("stage");
      const stack = document.getElementById("caption-stack");
      const panel = document.querySelector(".conversation-panel");
      const resizeHandle = document.querySelector(".resize-handle");
      const volumeLine = document.getElementById("volume-line");
      const interruptionLine = document.getElementById("interruption-line");
      const rhythmMeta = document.getElementById("rhythm-meta");

      const settings = {
        theme: "dark",
        fontSize: 26,
        maxLines: 2,
        position: "bottom",
        panelWidth: 1120,
        panelHeight: 240,
        panelOffsetX: 0,
        panelOffsetY: 0,
        editMode: false,
      };
      let dragState = null;
      let liveRhythmState = {
        samples: new Array(36).fill(0.02),
        interruption: 0,
        active: false,
        lastUpdateAt: 0,
      };
      let rhythmAnimationFrame = 0;

      const demoCaptions = [
        "Hello everyone, thanks for joining today.",
        "We can review the design after this section.",
        "The overlay should stay on top of Zoom during fullscreen.",
        "Please paste the API token for this meeting into the control panel.",
        "This preview mode cycles sample captions every few seconds.",
      ];
      const emotionSequence = ["happy", "sad", "angry", "calm", "excited"];
      let emotionIndex = 0;

      function inferEmotion(text) {
        const normalized = text.toLowerCase();

        if (/(great|happy|glad|love|thanks|wonderful|nice)/.test(normalized)) {
          return "happy";
        }

        if (/(sorry|sad|difficult|hard|unfortunately|upset|miss)/.test(normalized)) {
          return "sad";
        }

        if (/(stop|angry|mad|urgent|problem|wrong|frustrat)/.test(normalized)) {
          return "angry";
        }

        if (/(calm|steady|okay|breathe|slow|gentle|relax)/.test(normalized)) {
          return "calm";
        }

        if (/(amazing|wow|excited|awesome|yes!|let's go|incredible)/.test(normalized)) {
          return "excited";
        }

        const nextEmotion = emotionSequence[emotionIndex % emotionSequence.length];
        emotionIndex += 1;
        return nextEmotion;
      }

      function applySettings(nextSettings = {}) {
        Object.assign(settings, nextSettings);
        stage.className = `theme-${settings.theme} position-${settings.position}`;
        stack.style.fontSize = `${settings.fontSize}px`;
        panel.style.width = `min(100%, ${settings.panelWidth}px)`;
        panel.style.height = `${settings.panelHeight}px`;
        panel.style.transform = `translate(${settings.panelOffsetX}px, ${settings.panelOffsetY}px)`;
        panel.classList.toggle("editable", Boolean(settings.editMode));
        trimCaptions();
      }

      function clamp(value, min, max) {
        return Math.min(max, Math.max(min, value));
      }

      function formatPercent(value) {
        return `${Math.round(clamp(Number(value) || 0, 0, 1) * 100)}%`;
      }

      function buildSparklinePoints(samples = [], width = 260, height = 46) {
        if (!samples.length) {
          return `0,${height - 6} ${width},${height - 6}`;
        }

        return samples
          .map((sample, index) => {
            const x = samples.length === 1 ? width / 2 : (index / (samples.length - 1)) * width;
            const y = height - 6 - clamp(Number(sample) || 0, 0, 1) * (height - 12);
            return `${x.toFixed(2)},${y.toFixed(2)}`;
          })
          .join(" ");
      }

      function renderLiveRhythm() {
        const samples = liveRhythmState.samples.slice(-36);
        const interruptionSamples = Array.from({ length: Math.max(samples.length, 2) }, () => liveRhythmState.interruption);
        volumeLine.setAttribute("points", buildSparklinePoints(samples));
        interruptionLine.setAttribute("points", buildSparklinePoints(interruptionSamples));

        const average = samples.length
          ? samples.reduce((sum, value) => sum + value, 0) / samples.length
          : 0;
        rhythmMeta.textContent = liveRhythmState.active
          ? `Live ${formatPercent(average)} · Interrupt ${formatPercent(liveRhythmState.interruption)}`
          : "Listening standby";
      }

      function pushLiveRhythmSamples(samples = [], interruption = 0, active = true) {
        const normalized = Array.isArray(samples)
          ? samples
              .map((value) => clamp(Number(value) || 0, 0, 1))
              .slice(-8)
          : [];

        if (!normalized.length) {
          normalized.push(0);
        }

        liveRhythmState.samples.push(...normalized);
        while (liveRhythmState.samples.length > 36) {
          liveRhythmState.samples.shift();
        }

        liveRhythmState.interruption = clamp(interruption, 0, 1);
        liveRhythmState.active = Boolean(active);
        liveRhythmState.lastUpdateAt = Date.now();
        renderLiveRhythm();
      }

      function updateLiveRhythm(entry = {}) {
        const rhythm = entry.rhythm || entry;
        const samples = Array.isArray(rhythm.samples) ? rhythm.samples : [];
        pushLiveRhythmSamples(samples, Number(rhythm.interruption) || 0, Boolean(rhythm.active || samples.some((value) => value > 0.025)));
      }

      function animateRhythm() {
        const now = Date.now();
        const age = now - liveRhythmState.lastUpdateAt;

        if (!liveRhythmState.active || age > 160) {
          const lastValue = liveRhythmState.samples[liveRhythmState.samples.length - 1] || 0;
          const nextValue = age > 900 ? 0 : lastValue * 0.9;
          liveRhythmState.samples.push(nextValue);
          while (liveRhythmState.samples.length > 36) {
            liveRhythmState.samples.shift();
          }
          liveRhythmState.interruption *= 0.92;
          liveRhythmState.active = nextValue > 0.03;
          renderLiveRhythm();
        }

        rhythmAnimationFrame = window.requestAnimationFrame(animateRhythm);
      }

      function trimCaptions() {
        const stickyLimit = Math.max(settings.maxLines * 10, 18);
        while (stack.children.length > stickyLimit) {
          stack.removeChild(stack.firstElementChild);
        }
      }

      function renderCaption(entry) {
        const pill = document.createElement("div");
        const emotion = entry.emotion || inferEmotion(entry.text);
        const detectedLabel = entry.detectedEmotion || emotion;
        pill.className = `caption-pill emotion-${emotion}`;
        pill.innerHTML = `
          <span class="caption-text"></span>
          <span class="emotion-chip"></span>
        `;
        pill.querySelector(".caption-text").textContent = entry.text;
        pill.querySelector(".emotion-chip").textContent = detectedLabel;
        pill.dataset.emotion = emotion;
        stack.appendChild(pill);
        trimCaptions();
        stack.scrollTop = stack.scrollHeight;
      }

      function startDemoMode() {
        let index = 0;
        const buildDemoEntry = (text, step) => ({
          text,
          rhythm: {
            samples: Array.from({ length: 20 }, (_value, sampleIndex) =>
              clamp(0.22 + Math.sin((sampleIndex + step) * 0.42) * 0.18 + ((sampleIndex + step) % 5) * 0.03, 0.06, 0.92)
            ),
            interruption: step % 3 === 0 ? 0.48 : 0.12,
          },
        });

        const initialEntry = buildDemoEntry(demoCaptions[index], index);
        updateLiveRhythm(initialEntry);
        renderCaption(initialEntry);
        window.setInterval(() => {
          index = (index + 1) % demoCaptions.length;
          const nextEntry = buildDemoEntry(demoCaptions[index], index);
          updateLiveRhythm(nextEntry);
          renderCaption(nextEntry);
        }, DEMO_TIMEOUT);
      }

      function beginDrag(mode, event) {
        if (!settings.editMode) {
          return;
        }

        dragState = {
          mode,
          startX: event.clientX,
          startY: event.clientY,
          width: settings.panelWidth,
          height: settings.panelHeight,
          offsetX: settings.panelOffsetX,
          offsetY: settings.panelOffsetY,
        };
        event.preventDefault();
      }

      function onPointerMove(event) {
        if (!dragState) {
          return;
        }

        const dx = event.clientX - dragState.startX;
        const dy = event.clientY - dragState.startY;

        if (dragState.mode === "move") {
          settings.panelOffsetX = dragState.offsetX + dx;
          settings.panelOffsetY = dragState.offsetY + dy;
        } else if (dragState.mode === "resize") {
          settings.panelWidth = dragState.width + dx;
          settings.panelHeight = dragState.height + dy;
        }

        applySettings(settings);
      }

      function finishPointer() {
        if (!dragState) {
          return;
        }

        dragState = null;
        if (window.captionBridge) {
          window.captionBridge.updateSettings({
            panelWidth: settings.panelWidth,
            panelHeight: settings.panelHeight,
            panelOffsetX: settings.panelOffsetX,
            panelOffsetY: settings.panelOffsetY,
          });
        }
      }

      if (window.captionBridge) {
        window.captionBridge.onCaption((entry) => {
          if (entry && entry.text) {
            updateLiveRhythm(entry);
            renderCaption(entry);
          }
        });
        window.captionBridge.onClearCaptions(() => {
          stack.innerHTML = "";
          liveRhythmState = {
            samples: new Array(36).fill(0.02),
            interruption: 0,
            active: false,
            lastUpdateAt: Date.now(),
          };
          renderLiveRhythm();
        });

        window.captionBridge.onSettingsUpdate((nextSettings) => {
          applySettings(nextSettings);
        });

        window.captionBridge.onLiveRhythm((payload) => {
          updateLiveRhythm(payload);
        });

        panel.addEventListener("pointerdown", (event) => {
          if (event.target === resizeHandle) {
            beginDrag("resize", event);
            return;
          }

          if (settings.editMode && event.target.closest(".edit-toolbar")) {
            beginDrag("move", event);
          }
        });

        window.addEventListener("pointermove", onPointerMove);
        window.addEventListener("pointerup", finishPointer);
        window.addEventListener("pointercancel", finishPointer);
      } else {
        startDemoMode();
      }

      applySettings(settings);
      renderLiveRhythm();
      animateRhythm();
    </script>
  </body>
</html>
